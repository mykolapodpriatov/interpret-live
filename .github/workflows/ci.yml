name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check

      - name: Format check (ruff)
        run: ruff format --check

      - name: Type check (mypy)
        run: mypy src

      - name: Test (pytest, with coverage gate)
        run: |
          pytest -q \
            --cov=interpret_live \
            --cov-report=term-missing \
            --cov-fail-under=90

  package:
    name: wheel packaging (manifest discovery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel in a clean venv and discover the voice manifest
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --quiet dist/*.whl
          cd /tmp
          /tmp/wheel-venv/bin/python -c "
          from interpret_live.models import load_piper_manifest
          manifest = load_piper_manifest()
          assert manifest['voices'], 'piper_voices.json must ship in the wheel'
          print('manifest voices:', ', '.join(sorted(manifest['voices'])))
          "
