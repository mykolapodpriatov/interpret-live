name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * 1" # weekly optional-extra compatibility sweep
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Tests must never reach the network for models: mocked adapters only.
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"

jobs:
  test:
    name: core (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check

      - name: Format check (ruff)
        run: ruff format --check

      - name: Type check (mypy)
        run: mypy src

      - name: Test (pytest, with coverage gate)
        run: |
          pytest -q \
            --cov=interpret_live \
            --cov-report=term-missing \
            --cov-fail-under=90

  adapter-contract:
    name: adapter contract (py3.12, all extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with every live extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[whisper,mt,piper,audio,openai,dev]"

      - name: Assert every declared optional transport imports
        run: |
          python - <<'PY'
          import importlib

          for module in (
              "openai",
              "websockets",
              "faster_whisper",
              "transformers",
              "torch",
              "piper",
              "sounddevice",
              "soxr",
              "huggingface_hub",
              "platformdirs",
              "filelock",
          ):
              importlib.import_module(module)
              print(f"ok: {module}")
          PY

      - name: Test with extras installed (no model downloads)
        run: |
          pytest -q \
            --cov=interpret_live \
            --cov-report=term-missing \
            --cov-fail-under=90

  extras-compat:
    # Scheduled/manual only: the full dependency install is too expensive to
    # repeat for every PR on every Python version.
    name: extras compat (py${{ matrix.python-version }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with every live extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[whisper,mt,piper,audio,openai,dev]"

      - name: Test
        run: pytest -q

  package:
    name: wheel packaging (manifest discovery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel in a clean venv and discover the voice manifest
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --quiet dist/*.whl
          cd /tmp
          /tmp/wheel-venv/bin/python -c "
          from interpret_live.models import load_piper_manifest
          manifest = load_piper_manifest()
          assert manifest['voices'], 'piper_voices.json must ship in the wheel'
          print('manifest voices:', ', '.join(sorted(manifest['voices'])))
          "
